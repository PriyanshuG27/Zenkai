# ─────────────────────────────────────────────────────────────────────────────
# FitDesi CI/CD Pipeline
#
# Jobs:
#   1. test-client      — Vitest + coverage + npm audit (root)
#   2. test-functions   — Jest  + coverage + npm audit (functions/)
#   3. build            — Vite build + secret-leak scan + artifact upload
#   4. deploy-preview   — Vercel preview URL on every PR
#   5. deploy-production— Vercel prod + Firebase Functions on push to main
#
# Required GitHub Secrets:
#   VERCEL_TOKEN          — from vercel.com → Account Settings → Tokens
#   VERCEL_ORG_ID         — from .vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID     — from .vercel/project.json after `vercel link`
#   FIREBASE_TOKEN        — from `firebase login:ci` output
#   VITE_FIREBASE_API_KEY
#   VITE_FIREBASE_AUTH_DOMAIN
#   VITE_FIREBASE_PROJECT_ID
#   VITE_FIREBASE_STORAGE_BUCKET
#   VITE_FIREBASE_MESSAGING_SENDER_ID
#   VITE_FIREBASE_APP_ID
# ─────────────────────────────────────────────────────────────────────────────

name: FitDesi CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch/PR when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─── Job 1: Client Tests ──────────────────────────────────────────────────────
jobs:
  test-client:
    name: Client Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --run
        # --run exits after one pass (no watch mode)

      - name: Run coverage check (fail if < 70%)
        run: npm run test:coverage -- --run

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: client-coverage
          path: coverage/
          retention-days: 7

      - name: Audit dependencies (fail on HIGH+)
        # Allow the step to produce output even when it exits non-zero,
        # then we surface the full report before failing.
        run: npm audit --audit-level=high

  # ─── Job 2: Functions Tests ───────────────────────────────────────────────
  test-functions:
    name: Functions Tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run function tests
        run: npm test
        env:
          # Prevent Google SDK from making real network calls during tests
          GOOGLE_CLOUD_PROJECT: fitdesi-test
          FIRESTORE_EMULATOR_HOST: localhost:8080

      - name: Upload functions coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: functions-coverage
          path: functions/coverage/
          retention-days: 7

      - name: Audit function dependencies (fail on HIGH+)
        run: npm audit --audit-level=high

  # ─── Job 3: Build + Secret Scan ───────────────────────────────────────────
  build:
    name: Build & Security Scan
    runs-on: ubuntu-latest
    needs: test-client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          # Inject Firebase config from secrets — these become VITE_ env vars
          # and are embedded in the client bundle at build time.
          VITE_FIREBASE_API_KEY:                ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:            ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:             ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:         ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID:    ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:                 ${{ secrets.VITE_FIREBASE_APP_ID }}

      # ── Secret-leak scan ────────────────────────────────────────────────────
      # Fail hard if GEMINI_API_KEY appears anywhere in the compiled output.
      # The `|| true` at the end of grep inverts the logic:
      #   grep finds a match → exits 0 → `&& exit 1` fires → job fails.
      #   grep finds nothing  → exits 1 → `|| exit 0` fires → job passes.
      - name: Scan dist/ for leaked GEMINI_API_KEY
        run: |
          echo "Scanning dist/ for GEMINI_API_KEY..."
          if grep -r --include="*.js" --include="*.html" "GEMINI_API_KEY" dist/; then
            echo "::error::GEMINI_API_KEY found in build output! Aborting deploy."
            exit 1
          fi
          echo "✅ No secret keys found in build output."

      - name: Scan dist/ for common secret patterns
        run: |
          echo "Scanning for common secret patterns..."
          PATTERNS=("AIzaSy" "sk-" "private_key" "service_account")
          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            if grep -r --include="*.js" "$pattern" dist/ | grep -v "firebase" | grep -v "//"; then
              echo "::warning::Pattern '$pattern' found in dist/ — verify it is not a secret."
              FOUND=1
            fi
          done
          if [ $FOUND -eq 1 ]; then
            echo "::warning::Review the patterns above manually. Build not blocked — Firebase SDK keys are expected."
          fi
          echo "✅ Secret scan complete."

      - name: Verify dist/ size (warn if > 5MB uncompressed)
        run: |
          DIST_SIZE=$(du -sm dist/ | cut -f1)
          echo "dist/ size: ${DIST_SIZE}MB"
          if [ "$DIST_SIZE" -gt 5 ]; then
            echo "::warning::dist/ is ${DIST_SIZE}MB — consider further code splitting."
          fi

      - name: Upload dist/ as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitdesi-dist-${{ github.sha }}
          path: dist/
          retention-days: 30

  # ─── Job 4: Deploy Preview (PR only) ─────────────────────────────────────
  deploy-preview:
    name: Deploy Preview (Vercel)
    runs-on: ubuntu-latest
    needs: build
    # Only run on pull requests — not on direct pushes to main
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write   # needed to post the comment

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Download the pre-built dist/ from job 3 to avoid rebuilding
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: fitdesi-dist-${{ github.sha }}
          path: dist/

      - name: Deploy preview to Vercel
        id: vercel-preview
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          # No --prod flag → creates a preview deployment
          working-directory: ./
          github-token:      ${{ secrets.GITHUB_TOKEN }}
          github-comment:    false   # we post our own richer comment below

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const previewUrl = '${{ steps.vercel-preview.outputs.preview-url }}';
            const sha        = context.sha.substring(0, 7);
            const body = [
              '## 🚀 Preview Deployment Ready',
              '',
              `| | |`,
              `|---|---|`,
              `| **Preview URL** | [${previewUrl}](${previewUrl}) |`,
              `| **Commit** | \`${sha}\` |`,
              `| **Branch** | \`${{ github.head_ref }}\` |`,
              `| **Status** | ✅ Deployed |`,
              '',
              '_This preview will be updated on every new commit to this PR._',
            ].join('\n');

            // Find and update an existing bot comment instead of spamming new ones
            const { data: comments } = await github.rest.issues.listComments({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview Deployment Ready')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ─── Job 5: Deploy Production (main push only) ───────────────────────────
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    # Only run on direct pushes to main — not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://fitdesi.vercel.app   # update to your actual domain

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (root)
        run: npm ci

      - name: Install dependencies (functions)
        run: npm ci
        working-directory: functions

      # Download the pre-built dist/ from job 3
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: fitdesi-dist-${{ github.sha }}
          path: dist/

      # ── Deploy frontend to Vercel (production) ──────────────────────────
      - name: Deploy to Vercel (production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args:       '--prod'
          working-directory: ./

      # ── Deploy Firebase Rules ───────────────────────────────────────────
      - name: Deploy Firestore security rules
        run: npx firebase-tools deploy --only firestore:rules --token ${{ secrets.FIREBASE_TOKEN }} --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      # ── Deploy Cloud Functions ──────────────────────────────────────────
      - name: Deploy Firebase Cloud Functions
        run: npx firebase-tools deploy --only functions --token ${{ secrets.FIREBASE_TOKEN }} --non-interactive
        working-directory: functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deployment summary
        run: |
          echo "## ✅ Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (Vercel) | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "| Firestore Rules   | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "| Cloud Functions   | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
