# ─────────────────────────────────────────────────────────────────────────────
# Zenkai CI/CD Pipeline
#
# Jobs:
#   1. test-client      — Vitest + coverage + npm audit (root)
#   2. build            — Vite build + secret-leak scan + artifact upload
#   3. test-e2e         — Playwright E2E tests with Firebase Emulator
#   4. deploy-preview   — Vercel preview URL on every PR
#   5. deploy-production— Vercel prod + Firebase Rules on push to main
#
# Required GitHub Secrets:
#   VERCEL_TOKEN          — from vercel.com → Account Settings → Tokens
#   VERCEL_ORG_ID         — from .vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID     — from .vercel/project.json after `vercel link`
#   FIREBASE_TOKEN        — from `firebase login:ci` output
#   VITE_FIREBASE_API_KEY
#   VITE_FIREBASE_AUTH_DOMAIN
#   VITE_FIREBASE_PROJECT_ID
#   VITE_FIREBASE_STORAGE_BUCKET
#   VITE_FIREBASE_MESSAGING_SENDER_ID
#   VITE_FIREBASE_APP_ID
# ─────────────────────────────────────────────────────────────────────────────

name: Zenkai CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch/PR when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Job 1: Client Tests ──────────────────────────────────────────────────────
  test-client:
    name: Client Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests with coverage check (fail if < 70%)
        run: npm run test:coverage -- --run

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: client-coverage
          path: coverage/
          retention-days: 7

      - name: Audit dependencies (fail on HIGH+)
        # Audit only production dependencies to prevent dev-only vulnerabilities (like the Vite dev server) from blocking deploys.
        run: npm audit --audit-level=high --omit=dev

  # ─── Job 2: Build + Secret Scan ───────────────────────────────────────────
  build:
    name: Build & Security Scan
    runs-on: ubuntu-latest
    needs: test-client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build production bundle
        run: npm run build
        env:
          # Inject Firebase config from secrets — these become VITE_ env vars
          # and are embedded in the client bundle at build time.
          VITE_FIREBASE_API_KEY:                ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:            ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:             ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:         ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID:    ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:                 ${{ secrets.VITE_FIREBASE_APP_ID }}

      # ── Secret-leak scan ────────────────────────────────────────────────────
      # Fail hard if GEMINI_API_KEY appears anywhere in the compiled output.
      # The `|| true` at the end of grep inverts the logic:
      #   grep finds a match → exits 0 → `&& exit 1` fires → job fails.
      #   grep finds nothing  → exits 1 → `|| exit 0` fires → job passes.
      - name: Scan dist/ for leaked GEMINI_API_KEY
        run: |
          echo "Scanning dist/ for GEMINI_API_KEY..."
          if grep -r --include="*.js" --include="*.html" "GEMINI_API_KEY" dist/; then
            echo "::error::GEMINI_API_KEY found in build output! Aborting deploy."
            exit 1
          fi
          echo "✅ No secret keys found in build output."

      - name: Scan dist/ for common secret patterns
        run: |
          echo "Scanning for common secret patterns..."
          PATTERNS=("AIzaSy" "sk-" "private_key" "service_account")
          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            if grep -r --include="*.js" "$pattern" dist/ | grep -v "firebase" | grep -v "//"; then
              echo "::warning::Pattern '$pattern' found in dist/ — verify it is not a secret."
              FOUND=1
            fi
          done
          if [ $FOUND -eq 1 ]; then
            echo "::warning::Review the patterns above manually. Build not blocked — Firebase SDK keys are expected."
          fi
          echo "✅ Secret scan complete."

      - name: Verify dist/ size (warn if > 5MB uncompressed)
        run: |
          DIST_SIZE=$(du -sm dist/ | cut -f1)
          echo "dist/ size: ${DIST_SIZE}MB"
          if [ "$DIST_SIZE" -gt 5 ]; then
            echo "::warning::dist/ is ${DIST_SIZE}MB — consider further code splitting."
          fi

      - name: Upload dist/ as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: zenkai-dist-${{ github.sha }}
          path: dist/
          retention-days: 30

  # ─── Job 3: E2E Playwright Tests ────────────────────────────────────────────
  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: test-client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up JDK 21 (needed for Firebase Emulators)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps
          npm install --prefix backend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests inside Firebase Emulator
        run: npx firebase emulators:exec --project fitdesi-74283 "npm run test:e2e"
        env:
          VITE_FIREBASE_EMULATOR: "true"
          VITE_FIREBASE_API_KEY: "fake-api-key"
          VITE_FIREBASE_AUTH_DOMAIN: "fake-auth-domain"
          VITE_FIREBASE_PROJECT_ID: "fitdesi-74283"
          VITE_FIREBASE_STORAGE_BUCKET: "fake-bucket"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "123456789"
          VITE_FIREBASE_APP_ID: "fake-app-id"

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ─── Job 4: Deploy Preview (PRs) ────────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview (Vercel)
    runs-on: ubuntu-latest
    needs: [build, test-e2e]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: zenkai-dist-${{ github.sha }}
          path: dist/

      - name: Deploy Preview to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: '--local-config=vercel.json'

  # ─── Job 5: Deploy Production (Push to Main) ─────────────────────────────────
  deploy-production:
    name: Deploy Production (Vercel & Firebase)
    runs-on: ubuntu-latest
    needs: [build, test-e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: zenkai-dist-${{ github.sha }}
          path: dist/

      - name: Deploy Production to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod --local-config=vercel.json'
          working-directory: ./

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Deploy Firebase Rules and Indexes
        run: npx firebase deploy --only firestore:rules,firestore:indexes --token "${{ secrets.FIREBASE_TOKEN }}"



