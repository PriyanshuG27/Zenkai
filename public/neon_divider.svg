<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="24">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#080808" stop-opacity="0" />
      <stop offset="15%" stop-color="#FF5C00" />
      <stop offset="50%" stop-color="#B5FF2D" />
      <stop offset="85%" stop-color="#00D4FF" />
      <stop offset="100%" stop-color="#080808" stop-opacity="0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <style>
      .pulse { animation: p 4s infinite alternate ease-in-out; }
      @keyframes p { 0% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
  </defs>
  <!-- Background trace -->
  <rect x="0" y="10" width="100%" height="1" fill="#222" />
  <!-- Glowing neon core -->
  <rect class="pulse" x="5%" y="10" width="90%" height="3" rx="1.5" fill="url(#grad1)" filter="url(#glow)" />
</svg>
