<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Background Aurora Gradient Animations -->
    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5C00" stop-opacity="0.25">
        <animate attributeName="stop-color" values="#FF5C00;#00D4FF;#B5FF2D;#FF5C00" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#111111" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.15">
        <animate attributeName="stop-color" values="#00D4FF;#B5FF2D;#FF5C00;#00D4FF" dur="10s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Logo / Text Gradients -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5C00" />
      <stop offset="50%" stop-color="#FF8A00" />
      <stop offset="100%" stop-color="#B5FF2D" />
    </linearGradient>

    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF" />
      <stop offset="100%" stop-color="#B5FF2D" />
    </linearGradient>

    <!-- Pulse Filter for Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800;900&amp;family=Outfit:wght@600&amp;display=swap');
      
      .title-text {
        font-family: 'Barlow Condensed', -apple-system, sans-serif;
        font-weight: 900;
        font-size: 72px;
        fill: url(#textGrad);
        letter-spacing: 4px;
      }
      
      .subtitle-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 600;
        font-size: 16px;
        fill: #888888;
        letter-spacing: 3px;
      }

      .badge-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 600;
        font-size: 12px;
        fill: #B5FF2D;
        letter-spacing: 1.5px;
      }
      
      /* Keyframe Animations */
      @keyframes pulse {
        0% { transform: scale(1); opacity: 0.8; filter: drop-shadow(0 0 5px rgba(255,92,0,0.5)); }
        50% { transform: scale(1.08); opacity: 1; filter: drop-shadow(0 0 20px rgba(255,92,0,0.9)); }
        100% { transform: scale(1); opacity: 0.8; filter: drop-shadow(0 0 5px rgba(255,92,0,0.5)); }
      }

      @keyframes float {
        0% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-8px) rotate(3deg); }
        100% { transform: translateY(0px) rotate(0deg); }
      }

      @keyframes slideIn {
        from { transform: translateX(-50px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }

      .animated-logo {
        transform-origin: 110px 125px;
        animation: pulse 3s infinite ease-in-out;
      }

      .floating-icons {
        animation: float 6s infinite ease-in-out;
      }

      .text-group {
        animation: slideIn 1s ease-out forwards;
      }
      
      .glowing-dot {
        animation: pulse 1.5s infinite ease-in-out;
      }
    </style>
  </defs>

  <!-- Deep OLED Black Canvas -->
  <rect width="100%" height="100%" fill="#080808" rx="16" />
  
  <!-- Aurora Glow Background -->
  <rect width="100%" height="100%" fill="url(#aurora)" rx="16" />

  <!-- Grid Pattern Overlay for Neubrutalism feel -->
  <g opacity="0.07">
    <path d="M 0,25 L 800,25 M 0,50 L 800,50 M 0,75 L 800,75 M 0,100 L 800,100 M 0,125 L 800,125 M 0,150 L 800,150 M 0,175 L 800,175 M 0,200 L 800,200 M 0,225 L 800,225" stroke="#FFFFFF" stroke-width="1" />
    <path d="M 25,0 L 25,250 M 50,0 L 50,250 M 75,0 L 75,250 M 100,0 L 100,250 M 125,0 L 125,250 M 150,0 L 150,250 M 175,0 L 175,250 M 200,0 L 200,250 M 225,0 L 225,250 M 250,0 L 250,250 M 275,0 L 275,250 M 300,0 L 300,250" stroke="#FFFFFF" stroke-width="1" />
  </g>

  <!-- Animated Logo Graphic (Dumbbell with wings/energy) -->
  <g class="animated-logo">
    <!-- Outer Glow Circle -->
    <circle cx="110" cy="125" r="48" fill="#111111" stroke="#FF5C00" stroke-width="3" style="filter: drop-shadow(0 0 10px rgba(255, 92, 0, 0.4));" />
    <circle cx="110" cy="125" r="38" fill="#1a1a1a" stroke="#222222" stroke-width="1" />
    
    <!-- Dumbbell Icon -->
    <g transform="translate(90, 105)">
      <!-- Left Plate -->
      <rect x="2" y="8" width="6" height="24" rx="2" fill="#FF5C00" />
      <rect x="9" y="4" width="5" height="32" rx="2" fill="#FF8A00" />
      <!-- Bar -->
      <rect x="14" y="18" width="12" height="4" fill="#F0F0F0" />
      <!-- Right Plate -->
      <rect x="26" y="4" width="5" height="32" rx="2" fill="#FF8A00" />
      <rect x="32" y="8" width="6" height="24" rx="2" fill="#FF5C00" />
    </g>
  </g>

  <!-- Title & Subtitle Group -->
  <g class="text-group" transform="translate(190, 0)">
    <!-- Active release badge -->
    <g transform="translate(0, 58)">
      <rect x="0" y="0" width="190" height="24" rx="12" fill="#111111" stroke="#333333" stroke-width="1" />
      <!-- Pulsing Dot -->
      <circle class="glowing-dot" cx="15" cy="12" r="4" fill="#B5FF2D" />
      <text x="30" y="16" class="badge-text">COMEBACK RELEASE v1.0</text>
    </g>

    <!-- Main Title -->
    <text x="0" y="138" class="title-text">FIT<tspan fill="#F0F0F0">DESI</tspan></text>
    
    <!-- Subtitle -->
    <text x="3" y="176" class="subtitle-text">TRAIN SMARTER. COME BACK STRONGER.</text>
  </g>

  <!-- Creative Drift Elements (Floating gym stats / icons) -->
  <g class="floating-icons" transform="translate(680, 50)" opacity="0.8">
    <!-- Small XP Stat Bubble -->
    <rect x="0" y="0" width="90" height="36" rx="8" fill="#111111" stroke="#00D4FF" stroke-width="1" />
    <text x="12" y="22" font-family="'Outfit', sans-serif" font-weight="bold" font-size="12" fill="#00D4FF">+150 XP</text>
    <!-- Lightning zap indicator -->
    <path d="M 68,10 L 76,18 L 71,20 L 78,28" stroke="#B5FF2D" stroke-width="2" fill="none" stroke-linejoin="round"/>
  </g>

  <g class="floating-icons" transform="translate(650, 140)" opacity="0.6" style="animation-delay: -3s;">
    <!-- Small Streak Card -->
    <rect x="0" y="0" width="110" height="36" rx="8" fill="#111111" stroke="#FF5C00" stroke-width="1" />
    <text x="12" y="22" font-family="'Outfit', sans-serif" font-weight="bold" font-size="12" fill="#F0F0F0">STREAK 🔥 7</text>
  </g>
</svg>
